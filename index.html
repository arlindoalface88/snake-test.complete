<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
}
canvas {
  background:#111;
  border:2px solid white;
  display:block;
  margin:20px auto;
}
.controls {
  margin-top:20px;
}
button {
  width:80px;
  height:80px;
  font-size:30px;
  margin:5px;
  border-radius:10px;
  border:none;
  background:#333;
  color:white;
}
button:active {
  background:#666;
}
.restartBtn {
  display:none;
  margin-top:20px;
  padding:10px 20px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:lime;
  color:black;
}
</style>
</head>
<body>

<h1>Snake</h1>
<h2 id="score">Score: 0</h2>
<canvas id="game" width="600" height="600"></canvas>

<div class="controls">
  <div>
    <button onclick="setDirection('UP')">↑</button>
  </div>
  <div>
    <button onclick="setDirection('LEFT')">←</button>
    <button onclick="setDirection('DOWN')">↓</button>
    <button onclick="setDirection('RIGHT')">→</button>
  </div>
</div>

<button class="restartBtn" id="restartBtn" onclick="initGame()">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const box = 20;

let snake, direction, food, score, game, isGameOver;

function initGame() {
  snake = [
    {x:300, y:300},
    {x:280, y:300},
    {x:260, y:300}
  ];
  direction = "RIGHT";
  score = 0;
  isGameOver = false;
  document.getElementById("score").innerText = "Score: 0";
  criarFood();
  document.getElementById("restartBtn").style.display = "none";

  if(game) clearInterval(game); // limpa loop antigo
  game = setInterval(draw, 100);
}

function criarFood() {
  food = {
    x: Math.floor(Math.random()*30)*box,
    y: Math.floor(Math.random()*30)*box
  };
}

document.addEventListener("keydown", function(event){
  if(event.key=="w") setDirection("UP");
  if(event.key=="s") setDirection("DOWN");
  if(event.key=="a") setDirection("LEFT");
  if(event.key=="d") setDirection("RIGHT");
});

function setDirection(dir){
  if(dir=="UP" && direction!="DOWN") direction="UP";
  if(dir=="DOWN" && direction!="UP") direction="DOWN";
  if(dir=="LEFT" && direction!="RIGHT") direction="LEFT";
  if(dir=="RIGHT" && direction!="LEFT") direction="RIGHT";
}

function collision(head,array){
  for(let i=0;i<array.length;i++){
    if(head.x==array[i].x && head.y==array[i].y){
      return true;
    }
  }
  return false;
}

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,600,600);

  for(let i=0;i<snake.length;i++){
    ctx.fillStyle = i==0 ? "lime" : "white";
    ctx.fillRect(snake[i].x,snake[i].y,box,box);
  }

  ctx.fillStyle="blue";
  ctx.fillRect(food.x,food.y,box,box);

  if(isGameOver) {
    ctx.fillStyle = "red";
    ctx.font = "60px Arial";
    ctx.fillText("GAME OVER", 120, 300);
    return; // para de atualizar a cobra
  }

  let headX = snake[0].x;
  let headY = snake[0].y;

  if(direction=="LEFT") headX -= box;
  if(direction=="RIGHT") headX += box;
  if(direction=="UP") headY -= box;
  if(direction=="DOWN") headY += box;

  if(headX==food.x && headY==food.y){
    score++;
    document.getElementById("score").innerText="Score: "+score;
    criarFood();
  } else {
    snake.pop();
  }

  let newHead = {x:headX,y:headY};

  if(headX<0 || headX>=600 || headY<0 || headY>=600 || collision(newHead,snake)){
    isGameOver = true;
    document.getElementById("restartBtn").style.display = "inline-block"; // mostra botão restart
    return;
  }

  snake.unshift(newHead);
}

// inicia o jogo
initGame();
</script>

</body>
</html>
